<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title id="pageTitle"></title>
  <style>
    /* 1. Default */
    :root {
      --bg-color: #f7f9fc;
      --card-bg-color: #ffffff;
      --text-color: #1f2937;
      --label-color: #4b5563;
      --border-color: #e5e7eb;
      --primary-color: #3b82f6;
      --primary-hover-color: #2563eb;
      --success-color: #10b981;
      --error-color: #ef4444;
      --input-bg-color: #ffffff;
      --shadow-color: rgba(0, 0, 0, 0.05);
    }

    /* 2. Dark Mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #111827;
        --card-bg-color: #1f2937;
        --text-color: #f9fafb;
        --label-color: #9ca3af;
        --border-color: #374151;
        --input-bg-color: #2d3748;
        --primary-color: #3b82f6;
        --primary-hover-color: #60a5fa;
        --shadow-color: rgba(0, 0, 0, 0.4);
      }
    }

    /* 3. Base */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* 4. Container */
    .container {
      background-color: var(--card-bg-color);
      padding: 2.5em;
      border-radius: 16px;
      box-shadow: 0 10px 40px var(--shadow-color);
      width: 100%;
      max-width: 800px;
      border: 1px solid var(--border-color);
      box-sizing: border-box;
      margin: 2em;
    }

    /* Header matching PagePalette */
    header {
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 8px;
      color: var(--text-color);
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--label-color);
      margin-top: 0;
      margin-bottom: 0;
      opacity: 0.9;
    }

    /* 5. Elements */
    label {
      display: block;
      font-size: 0.9em;
      color: var(--label-color);
      margin-bottom: 0.6em;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    input[type="url"],
    input[type="number"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background-color: var(--input-bg-color);
      color: var(--text-color);
      font-size: 1em;
      box-sizing: border-box;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    input[type="url"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 20%, transparent);
    }

    .feeds-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .feeds-header h2 {
      font-size: 20px;
      margin: 0;
    }

    button {
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      transition: background-color 0.2s;
    }

    .primary-btn {
      background-color: var(--primary-color);
      color: white;
    }

    .primary-btn:hover {
      background-color: var(--primary-hover-color);
    }

    /* 6. Feed Row Styles */
    .feed-row {
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5em;
      margin-bottom: 1.5em;
      position: relative;
      display: flex;
      gap: 1em;
      align-items: flex-end;
      transition: all 0.3s ease;
    }

    .feed-input-group {
      display: flex;
      flex-direction: column;
    }

    .feed-input-group.url-group {
      flex-grow: 1;
    }

    .feed-input-group.interval-group {
      flex-shrink: 0;
      width: 140px;
    }

    .feed-row label {
      margin-top: 0 !important;
      margin-bottom: 0.4em;
    }

    .feed-row input {
      margin-bottom: 0;
    }

    button.remove-btn {
      margin-top: 0;
      padding: 10px 16px;
      height: 48px; /* Match input height */
      background-color: transparent;
      color: var(--error-color);
      border: 1px solid var(--error-color);
      border-radius: 10px;
      font-weight: 600;
      flex-shrink: 0;
      width: auto;
      white-space: nowrap;
    }

    button.remove-btn:hover {
      background-color: var(--error-color);
      color: #ffffff;
    }

    /* 7. Status Message Styles */
    #status {
      margin-top: 1.5em;
      text-align: center;
      font-weight: 500;
      min-height: 1.2em;
    }
  </style>
</head>

<body>

  <div class="container">
    <header>
      <div style="display: flex; justify-content: flex-end; width: 100%; margin-bottom: -1.5em; position: relative; z-index: 10;">
        <select id="langSelect" style="width: auto; padding: 6px; font-size: 0.85em; cursor: pointer; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--input-bg-color); color: var(--text-color);">
          <option value="auto">Auto (Browser)</option>
          <option value="en">English (en)</option>
          <option value="de">Deutsch (de)</option>
          <option value="es">Español (es)</option>
          <option value="fr">Français (fr)</option>
          <option value="ja">日本語 (ja)</option>
          <option value="pt_BR">Português (pt_BR)</option>
          <option value="zh_CN">中文 (zh_CN)</option>
        </select>
      </div>
      <h1 id="optionsH1"></h1>
      <p id="optionsDesc"></p>
    </header>

    <main>
      <div class="feeds-header">
        <h2 id="feedsHeading">Feeds</h2>
        <button id="addFeedButton" class="primary-btn" type="button"></button>
      </div>

      <div id="feedsContainer"></div>
      <div id="status"></div>
    </main>
  </div>

  <script src="options.js"></script>
</body>

</html>
